# default configuration - won't be overridden

# Versions Cleaner - Scheduled job configuration
# Changes to this file require a module restart to take effect.

# Set to false to enable the scheduled automatic cleanup.
disabled=true

# Quartz cron expression for the scheduled cleanup.
# Default: every day at 01:30.
cronExpression=0 30 1 * * ?

# Number of versions to retain per non-orphaned version history.
# Set to -1 to skip non-orphaned histories entirely and only process orphaned ones.
nbVersionsToKeep=2

# Whether to also delete orphaned version histories (histories with no live node).
deleteOrphanedVersions=false

# Whether to check and fix JCR reference integrity before cleaning.
checkIntegrity=false

# Whether to reindex the default workspace before cleaning.
reindexDefaultWorkspace=false

# Maximum execution time in milliseconds. Set to 0 for unlimited.
# The process saves its position so it can resume where it stopped on the next run.
maxExecutionTimeInMs=60000
